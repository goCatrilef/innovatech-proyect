spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ms_equipos_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    health:
      show-details: always

app:
  proyectos-service:
    url: http://localhost:8082
  cors:
    allowed-origins: http://localhost:5173
