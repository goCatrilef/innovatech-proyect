name: innovatech

x-spring-common: &spring-common
  restart: unless-stopped
  environment: &spring-environment
    SPRING_PROFILES_ACTIVE: container
    EUREKA_CLIENT_ENABLED: "true"
    EUREKA_URL: http://eureka-server:8761/eureka/
    EUREKA_PREFER_IP_ADDRESS: "true"
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    TZ: America/Santiago
  networks:
    - innovatech-network

services:
  postgres:
    image: postgres:16-alpine
    container_name: innovatech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: America/Santiago
    ports:
      - "${POSTGRES_HOST_PORT:-15433}:5432"
    volumes:
      - innovatech-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - innovatech-network

  keycloak:
    build:
      context: ./infra/keycloak
    image: innovatech/keycloak:${APP_VERSION:-1.0.0}
    container_name: innovatech-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
      - --spi-theme-static-max-age=-1
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8085}
      KC_HOSTNAME_STRICT: "false"
      TZ: America/Santiago
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_HOST_PORT:-8085}:8080"
      - "${KEYCLOAK_MANAGEMENT_HOST_PORT:-19000}:9000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0;
          grep 'HTTP/1.0 200'; } 0<>/dev/tcp/127.0.0.1/9000"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - innovatech-network

  eureka-server:
    <<: *spring-common
    build:
      context: ./eureka-server
    image: innovatech/eureka-server:${APP_VERSION:-1.0.0}
    container_name: innovatech-eureka
    environment:
      <<: *spring-environment
      SERVER_PORT: 8761
      EUREKA_SELF_PRESERVATION: "false"
      MANAGEMENT_HEALTH_SHOW_DETAILS: always
    ports:
      - "${EUREKA_HOST_PORT:-8761}:8761"

  ms-proyectos:
    <<: *spring-common
    build:
      context: ./ms-proyectos
    image: innovatech/ms-proyectos:${APP_VERSION:-1.0.0}
    container_name: innovatech-ms-proyectos
    environment:
      <<: *spring-environment
      SERVER_PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ms_proyectos_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "${MS_PROYECTOS_HOST_PORT:-8082}:8082"

  ms-equipos:
    <<: *spring-common
    build:
      context: ./ms-equipos
    image: innovatech/ms-equipos:${APP_VERSION:-1.0.0}
    container_name: innovatech-ms-equipos
    environment:
      <<: *spring-environment
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ms_equipos_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      PROYECTOS_SERVICE_URL: http://ms-proyectos:8082
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      ms-proyectos:
        condition: service_healthy
    ports:
      - "${MS_EQUIPOS_HOST_PORT:-8081}:8081"

  ms-tareas:
    <<: *spring-common
    build:
      context: ./ms-tareas
    image: innovatech/ms-tareas:${APP_VERSION:-1.0.0}
    container_name: innovatech-ms-tareas
    environment:
      <<: *spring-environment
      SERVER_PORT: 8083
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ms_tareas_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      PROYECTOS_SERVICE_URL: http://ms-proyectos:8082
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      ms-proyectos:
        condition: service_healthy
    ports:
      - "${MS_TAREAS_HOST_PORT:-8083}:8083"

  api-gateway:
    <<: *spring-common
    build:
      context: ./api-gateway
    image: innovatech/api-gateway:${APP_VERSION:-1.0.0}
    container_name: innovatech-api-gateway
    environment:
      <<: *spring-environment
      SERVER_PORT: 8080
      MANAGEMENT_HEALTH_SHOW_DETAILS: always
    depends_on:
      eureka-server:
        condition: service_healthy
      ms-equipos:
        condition: service_healthy
      ms-proyectos:
        condition: service_healthy
      ms-tareas:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_HOST_PORT:-8080}:8080"

  bff-service:
    <<: *spring-common
    build:
      context: ./bff-service
    image: innovatech/bff-service:${APP_VERSION:-1.0.0}
    container_name: innovatech-bff
    environment:
      <<: *spring-environment
      SERVER_PORT: 8090
      API_GATEWAY_URL: http://api-gateway:8080
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8085}/realms/${KEYCLOAK_REALM:-innovatech}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-innovatech}/protocol/openid-connect/certs
      MANAGEMENT_HEALTH_SHOW_DETAILS: always
    depends_on:
      eureka-server:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${BFF_HOST_PORT:-8090}:8090"

  frontend:
    build:
      context: ./frontend-innovatech
    image: innovatech/frontend:${APP_VERSION:-1.0.0}
    container_name: innovatech-frontend
    restart: unless-stopped
    environment:
      BFF_PUBLIC_URL: ${BFF_PUBLIC_URL:-http://localhost:8090}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8085}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-innovatech}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-innovatech-frontend}
      TZ: America/Santiago
    depends_on:
      bff-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:8080"
    networks:
      - innovatech-network

volumes:
  innovatech-postgres-data:
    name: innovatech-postgres-data

networks:
  innovatech-network:
    name: innovatech-network
    driver: bridge
