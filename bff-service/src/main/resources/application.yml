server:
    port: 8090

spring:
    application:
        name: bff-service
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8085/realms/innovatech

eureka:
    client:
        enabled: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            show-details: always

springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true
        path: /swagger-ui.html

app:
    api-gateway:
        url: http://localhost:8080
