server:
    port: 8080

spring:
    application:
        name: api-gateway

    cloud:
        gateway:
            server:
                webmvc:
                    routes:
                        - id: ms-proyectos
                          uri: lb://MS-PROYECTOS
                          predicates:
                              - Path=/api/proyectos,/api/proyectos/**

                        - id: ms-equipos
                          uri: lb://MS-EQUIPOS
                          predicates:
                              - Path=/api/equipos,/api/equipos/**

                        - id: ms-tareas
                          uri: lb://MS-TAREAS
                          predicates:
                              - Path=/api/tareas,/api/tareas/**

eureka:
    client:
        enabled: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true

management:
    endpoints:
        web:
            exposure:
                include: health,info,gateway
    endpoint:
        health:
            show-details: always
